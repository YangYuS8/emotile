name: Release Preflight

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to check (optional; defaults to package.json version)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run release preflight
        run: node scripts/release-preflight.mjs
        env:
          PREFLIGHT_VERSION: ${{ inputs.version }}
